name: Build Docker Image

on:
  workflow_dispatch:

env:
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: crew-shop-service

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="prod-${SHORT_SHA}"
          IMAGE_NAME="crew-shop-service-prod"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ secrets.GCLOUD_PROJECT_ID }}/${{ env.REPOSITORY }}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "name=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCLOUD_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.full }}

      - name: Output image info
        run: |
          echo "::notice::Docker image built and pushed successfully!"
          echo "::notice::Image: ${{ steps.image.outputs.full }}"
          echo "::notice::Tag: ${{ steps.image.outputs.tag }}"
          echo ""
          echo "To deploy this image, run the 'Deploy to Production' workflow"
          echo "with image tag: ${{ steps.image.outputs.tag }}"
