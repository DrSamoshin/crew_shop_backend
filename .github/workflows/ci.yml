name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    # Integration tests run against a real PostgreSQL (asyncio_mode=auto, no skips).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: crew_shop_db
          POSTGRES_USER: crew_shop
          POSTGRES_PASSWORD: crew_shop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crew_shop -d crew_shop_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENV: dev
      DATABASE_URL: postgresql+asyncpg://crew_shop:crew_shop@localhost:5432/crew_shop_db

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy strict)
        run: uv run mypy src

      - name: Test
        run: uv run pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        # Skip login for pull requests: build to validate, but do not push.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix={{branch}}-

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # GitOps: write the freshly built image tag into the infra repo. ArgoCD watches that
  # repo and rolls out the new image automatically. Runs only for pushes to main.
  deploy:
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: DrSamoshin/crew_infrastructure
          ref: main
          ssh-key: ${{ secrets.INFRA_DEPLOY_KEY }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump crew-shop prod API image tag
        run: |
          TAG="main-${GITHUB_SHA::7}"
          yq -i ".api.image.tag = \"${TAG}\"" helm/crew-shop/values-prod.yaml
          echo "set api.image.tag=${TAG}"

      - name: Commit and push
        run: |
          git config user.name "crew-shop-ci"
          git config user.email "ci@crewservices.org"
          git add helm/crew-shop/values-prod.yaml
          if git diff --cached --quiet; then
            echo "no change to commit"
          else
            git commit -m "deploy(crew-shop): prod image main-${GITHUB_SHA::7}"
            # The infra repo is also pushed to by hand; rebase instead of failing the
            # deploy if someone landed a commit while this job was building.
            git pull --rebase
            git push
          fi
