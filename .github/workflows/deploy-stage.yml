name: Deploy to Stage

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., stage-abc1234)"
        required: true
        type: string

env:
  REGION: europe-west1
  SERVICE_NAME: crew-shop-backend-stage
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: crew-shop-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCLOUD_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set image path
        id: image
        run: |
          IMAGE_NAME="crew-shop-backend-stage"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ secrets.GCLOUD_PROJECT_ID }}/${{ env.REPOSITORY }}/${IMAGE_NAME}:${{ inputs.image_tag }}"
          echo "full=${FULL_IMAGE}" >> $GITHUB_OUTPUT

      - name: Validate image exists
        run: |
          echo "Checking if image exists: ${{ steps.image.outputs.full }}"
          if ! gcloud artifacts docker images describe "${{ steps.image.outputs.full }}" --format="get(name)" > /dev/null 2>&1; then
            echo "::error::Image not found: ${{ steps.image.outputs.full }}"
            exit 1
          fi
          echo "Image validated"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ steps.image.outputs.full }}
          region: ${{ env.REGION }}
          flags: '--allow-unauthenticated --min-instances=0 --max-instances=1 --memory=512Mi --cpu=1 --add-cloudsql-instances=${{ secrets.DATABASE_HOST }}'
          env_vars: |
            ENV=stage
            LOG_LEVEL=INFO
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }}

      - name: Output deployed URL
        run: |
          echo "::notice::Stage deployment successful!"
          echo "::notice::Image: ${{ steps.image.outputs.full }}"
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "::notice::Service URL: ${URL}"
