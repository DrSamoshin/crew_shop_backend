name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., prod-abc1234)"
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGION: europe-west1
  SERVICE_NAME: crew-shop-service-prod
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: crew-shop-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCLOUD_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set image path
        id: image
        run: |
          IMAGE_NAME="crew-shop-service-prod"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ secrets.GCLOUD_PROJECT_ID }}/${{ env.REPOSITORY }}/${IMAGE_NAME}:${{ inputs.image_tag }}"
          echo "full=${FULL_IMAGE}" >> $GITHUB_OUTPUT

      - name: Validate image exists
        run: |
          echo "Checking if image exists: ${{ steps.image.outputs.full }}"
          if ! gcloud artifacts docker images describe "${{ steps.image.outputs.full }}" --format="get(name)" > /dev/null 2>&1; then
            echo "::error::Image not found: ${{ steps.image.outputs.full }}"
            exit 1
          fi
          echo "Image validated"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ steps.image.outputs.full }}
          region: ${{ env.REGION }}
          flags: '--allow-unauthenticated --min-instances=1 --max-instances=100 --memory=1Gi --cpu=2 --add-cloudsql-instances=${{ secrets.DATABASE_HOST }}'
          env_vars: |
            ENV=prod
            LOG_LEVEL=INFO
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            CREW_AUTH_URL=${{ secrets.CREW_AUTH_URL }}

      - name: Output deployment info
        run: |
          echo "::notice::Production deployment successful!"
          echo "::notice::Image: ${{ steps.image.outputs.full }}"
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "::notice::Service URL: ${URL}"
