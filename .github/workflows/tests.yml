name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: crew_shop
          POSTGRES_PASSWORD: crew_shop
          POSTGRES_DB: crew_shop_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crew_shop -d crew_shop_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENV: dev
      DATABASE_URL: postgresql+asyncpg://crew_shop:crew_shop@localhost:5432/crew_shop_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy strict)
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest
